version: "3.9"

services:

  backend:
    build: ./backend
    container_name: harry_backend
    ports:
      - "8100:8100"
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8100
    restart: unless-stopped


  frontend:
    build: ./niceGUI
    container_name: harry_frontend
    ports:
      - "8091:8091"
    volumes:
      - ./niceGUI:/app
    depends_on:
      - backend
    restart: unless-stopped
